apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  description: This task cleans up the workspace by removing all files
  workspaces:
    - name: source
  steps:
    - name: remove
      image: alpine:3
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -eu
        echo "Cleaning workspace..."
        rm -rf $(workspaces.source.path)/*
        echo "Cleanup completed"

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: eslint
spec:
  description: This task runs ESLint to check code quality
  workspaces:
    - name: source
  params:
    - name: args
      description: Arguments to pass to ESLint
      type: string
      default: "src/ tests/"
  steps:
    - name: lint
      image: node:20-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set +e
        echo "Installing dependencies..."
        npm install || true
        echo "Running ESLint..."
        npx eslint $(params.args) || true
        echo "ESLint completed"

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jest-test
spec:
  description: This task runs Jest unit tests
  workspaces:
    - name: source
  params:
    - name: args
      description: Arguments to pass to Jest
      type: string
      default: "-v"
  steps:
    - name: jest
      image: node:20-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set +e
        echo "Installing dependencies..."
        npm install || true
        echo "Running Jest tests..."
        npx jest $(params.args) || true
        echo "Jest tests completed"
